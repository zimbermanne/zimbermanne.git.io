<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShoutBoard - Access</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'DM Sans',sans-serif;
    background:#f7f2e8;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.container{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:16px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}
.left{
    background:#1b2e20;
    color:white;
    padding:50px;
}
.left h1{
    font-size:3rem;
    margin-bottom:20px;
}
.left p{
    line-height:1.8;
}
.right{
    padding:50px;
}
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
.tabs button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
}
.active-tab{
    background:black;
    color:white;
}
input{
    width:100%;
    padding:14px;
    margin-bottom:14px;
    border-radius:8px;
    border:1px solid #ccc;
}
button.submit{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:black;
    color:white;
    font-weight:700;
    cursor:pointer;
}
#register-form{
    display:none;
}
@media(max-width:768px){
    .container{
        grid-template-columns:1fr;
    }
    .left{
        display:none;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="left">
    <h1>ShoutBoard</h1>
    <p>
        Tanzania's public digital announcement board.<br><br>
        Create posts, announcements, greetings and public messages.
    </p>
</div>

<div class="right">

<div class="tabs">
    <button id="login-tab" class="active-tab" onclick="switchTab('login')">
        Sign In
    </button>

    <button id="register-tab" onclick="switchTab('register')">
        Create Account
    </button>
</div>

<div id="login-form">
    <input type="text" id="login-name" placeholder="Enter Your Name">
    <button class="submit" onclick="loginUser()">
        Enter Dashboard
    </button>
</div>

<div id="register-form">
    <input type="text" id="reg-name" placeholder="Full Name">
    <input type="text" id="reg-phone" placeholder="Phone Number">
    <input type="email" id="reg-email" placeholder="Email Address">

    <button class="submit" onclick="registerUser()">
        Create Account
    </button>
</div>

</div>
</div>

<script>

function switchTab(tab){

    document.getElementById("login-form").style.display =
        tab === "login" ? "block" : "none";

    document.getElementById("register-form").style.display =
        tab === "register" ? "block" : "none";

    document.getElementById("login-tab").classList.toggle(
        "active-tab",
        tab === "login"
    );

    document.getElementById("register-tab").classList.toggle(
        "active-tab",
        tab === "register"
    );
}

function registerUser(){

    const user = {
        name: document.getElementById("reg-name").value,
        phone: document.getElementById("reg-phone").value,
        email: document.getElementById("reg-email").value
    };

    localStorage.setItem("shoutboard_user", JSON.stringify(user));

    window.location.href = "dashboard.html";
}

function loginUser(){

    const name = document.getElementById("login-name").value;

    if(!name){
        alert("Please enter your name.");
        return;
    }

    const user = {
        name: name
    };

    localStorage.setItem("shoutboard_user", JSON.stringify(user));

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
