<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBAONI - Access</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'DM Sans',sans-serif;
    background:#f7f2e8;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:20px 16px;
}
.container{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:16px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}
.left{
    background:#1b2e20;
    color:white;
    padding:50px;
}
.left h1{
    font-size:3rem;
    margin-bottom:20px;
}
.left p{
    line-height:1.8;
}
.right{
    padding:50px;
}
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
.tabs button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    font-family:'DM Sans',sans-serif;
    font-size:1rem;
    transition: background 0.2s, color 0.2s;
}
.active-tab{
    background:black;
    color:white;
}
.inactive-tab {
    background: #f0f0f0;
    color: #555;
}
.field-group {
    position: relative;
    margin-bottom: 14px;
}
input{
    width:100%;
    padding:14px;
    padding-right: 44px;
    border-radius:8px;
    border:1px solid #ccc;
    font-family:'DM Sans',sans-serif;
    font-size:1rem;
    transition: border-color 0.2s;
}
input:focus {
    outline: none;
    border-color: #1b2e20;
}
.toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: #888;
    font-size: 1rem;
    line-height: 1;
}
.toggle-pw:hover { color: #333; }

button.submit{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:black;
    color:white;
    font-weight:700;
    font-family:'DM Sans',sans-serif;
    font-size:1rem;
    cursor:pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
}
button.submit:hover { background: #222; }
button.submit:active { transform: scale(0.98); }
button.submit:disabled {
    background: #888;
    cursor: not-allowed;
}

.error-msg {
    color: #e74c3c;
    font-size: 0.85rem;
    margin-top: -8px;
    margin-bottom: 10px;
    display: none;
}
.error-msg.show { display: block; }

#register-form{
    display:none;
}
@media(max-width:768px){
    body{
        align-items:flex-start;
        padding:16px 12px 24px;
    }
    .container{
        grid-template-columns:1fr;
        border-radius:20px;
    }
    .left,
    .right{
        padding:32px 24px;
    }
    .left{
        border-bottom:1px solid rgba(255,255,255,.08);
    }
    .left h1{
        font-size:2.5rem;
    }
    .tabs{
        flex-wrap:wrap;
    }
    .tabs button{
        flex:1 1 48%;
    }
}
@media(max-width:480px){
    .left,
    .right{
        padding:24px 18px;
    }
    .left h1{
        font-size:2rem;
    }
    .tabs button{
        flex:1 1 100%;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="left">
    <h1>UBAONI</h1>
    <p>
        Tanzania's public announcement and community board.<br><br>
        Post announcements, business ads, greetings, and events.
    </p>
</div>

<div class="right">

<div class="tabs">
    <button id="login-tab" class="active-tab" onclick="switchTab('login')">
        Sign In
    </button>
    <button id="register-tab" class="inactive-tab" onclick="switchTab('register')">
        Create Account
    </button>
</div>

<div id="login-form">
    <div class="field-group">
        <input type="text" id="login-name" placeholder="Your Name" autocomplete="username">
    </div>
    <div class="field-group">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
        <button type="button" class="toggle-pw" onclick="togglePw('login-password', this)" title="Show/hide password">👁</button>
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="submit" id="login-btn" onclick="loginUser()">Enter Dashboard</button>
</div>

<div id="register-form">
    <div class="field-group">
        <input type="text" id="reg-name" placeholder="Full Name" autocomplete="name">
    </div>
    <div class="field-group">
        <input type="text" id="reg-phone" placeholder="Phone Number" autocomplete="tel">
    </div>
    <div class="field-group">
        <input type="email" id="reg-email" placeholder="Email Address" autocomplete="email">
    </div>
    <div class="field-group">
        <input type="password" id="reg-password" placeholder="Password (min. 6 characters)" autocomplete="new-password">
        <button type="button" class="toggle-pw" onclick="togglePw('reg-password', this)" title="Show/hide password">👁</button>
    </div>
    <div class="error-msg" id="register-error"></div>
    <button class="submit" id="register-btn" onclick="registerUser()">Create Account</button>
</div>

</div>
</div>

<script>
// Point dynamically to host URL
const API = window.location.origin;

function switchTab(tab){
    document.getElementById("login-form").style.display   = tab === "login"    ? "block" : "none";
    document.getElementById("register-form").style.display = tab === "register" ? "block" : "none";
    document.getElementById("login-tab").className    = tab === "login"    ? "active-tab" : "inactive-tab";
    document.getElementById("register-tab").className  = tab === "register" ? "active-tab" : "inactive-tab";
    document.getElementById("login-error").classList.remove("show");
    document.getElementById("register-error").classList.remove("show");
}

function togglePw(fieldId, btn) {
    const input = document.getElementById(fieldId);
    if (input.type === "password") {
        input.type = "text";
        btn.textContent = "🙈";
    } else {
        input.type = "password";
        btn.textContent = "👁";
    }
}

function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add("show");
}

function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    
    // FIX: Provide explicit string fallbacks right here if dataset attributes haven't fully bound yet
    const fallbackText = btnId === "login-btn" ? "Enter Dashboard" : "Create Account";
    btn.textContent = loading ? "Please wait…" : (btn.dataset.label || fallbackText);
}

// Store original labels on load
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("login-btn").dataset.label = "Enter Dashboard";
    document.getElementById("register-btn").dataset.label = "Create Account";
});

function registerUser(){
    const name     = document.getElementById("reg-name").value.trim();
    const phone    = document.getElementById("reg-phone").value.trim();
    const email    = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;

    document.getElementById("register-error").classList.remove("show");

    if (!name)          return showError("register-error", "Please enter your name.");
    if (!password)      return showError("register-error", "Please create a password.");
    if (password.length < 6) return showError("register-error", "Password must be at least 6 characters.");

    setLoading("register-btn", true);

    fetch(`${API}/api/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, password })
    })
    .then(res => res.json())
    .then(data => {
        setLoading("register-btn", false);
        if (data.error) {
            showError("register-error", data.error);
        } else {
            localStorage.setItem("UBAONI_user", JSON.stringify(data));
            window.location.href = "dashboard.html";
        }
    })
    .catch(() => {
        setLoading("register-btn", false);
        showError("register-error", "Connection error. Failed to reach server.");
    });
}

function loginUser(){
    const name     = document.getElementById("login-name").value.trim();
    const password = document.getElementById("login-password").value;

    document.getElementById("login-error").classList.remove("show");

    if (!name)     return showError("login-error", "Please enter your name.");
    if (!password) return showError("login-error", "Please enter your password.");

    setLoading("login-btn", true);

    fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
    })
    .then(res => res.json())
    .then(data => {
        setLoading("login-btn", false);
        if (data.error) {
            showError("login-error", data.error);
        } else {
            localStorage.setItem("UBAONI_user", JSON.stringify(data));
            window.location.href = "dashboard.html";
        }
    })
    .catch(() => {
        setLoading("login-btn", false);
        showError("login-error", "Connection error. Failed to reach server.");
    });
}

// FIX: Target and query element visibility using computed styles safely for cross-browser stability
document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const loginForm = document.getElementById("login-form");
    const loginVisible = loginForm.style.display !== "none" && window.getComputedStyle(loginForm).display !== "none";
    if (loginVisible) loginUser(); else registerUser();
});
</script>

</body>
</html>
