<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBAONI - Access</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'DM Sans',sans-serif;
    background:#f7f2e8;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:20px 16px;
}
.container{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:16px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}
.left{
    background:#1b2e20;
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}
.left h1{
    font-size:3rem;
    margin-bottom:1rem;
    line-height:1.1;
}
.left p{
    opacity:.8;
    line-height:1.6;
}
.right{
    padding:50px;
}
.tab-nav{
    display:flex;
    gap:20px;
    margin-bottom:30px;
    border-bottom:1px solid #eee;
}
.tab-link{
    padding-bottom:10px;
    cursor:pointer;
    font-weight:600;
    color:#999;
}
.tab-link.active{
    color:#1b2e20;
    border-bottom:2px solid #1b2e20;
}
.form-section{
    display:none;
}
.form-section.active{
    display:block;
}
label{
    display:block;
    font-size:.85rem;
    font-weight:600;
    margin-bottom:8px;
    color:#444;
}
input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:20px;
    font-family:inherit;
}
.btn{
    width:100%;
    padding:14px;
    background:#1b2e20;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    transition:opacity .2s;
}
.btn:disabled{
    opacity:.5;
    cursor:not-allowed;
}
.error-msg{
    background:#fff5f5;
    color:#c53030;
    padding:10px;
    border-radius:6px;
    font-size:.85rem;
    margin-bottom:15px;
    display:none;
}
.error-msg.show{
    display:block;
}

@media(max-width:768px){
    .container{grid-template-columns:1fr;}
    .left{padding:30px; text-align:center;}
    .left h1{font-size:2rem;}
    .right{padding:30px;}
}
</style>
</head>
<body>

<div class="container">
    <div class="left">
        <h1>UBAONI</h1>
        <p>Your digital community noticeboard. Connect, share, and stay updated with what's happening around you.</p>
    </div>

    <div class="right">
        <div class="tab-nav">
            <div class="tab-link active" onclick="showTab('login')">Login</div>
            <div class="tab-link" onclick="showTab('register')">Register</div>
        </div>

        <div id="login-section" class="form-section active">
            <div id="login-error" class="error-msg"></div>
            <label>Username</label>
            <input type="text" id="login-name" placeholder="Enter your name">
            
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
            
            <button class="btn" id="login-btn" onclick="loginUser()">Sign In</button>
        </div>

        <div id="id-register-section" class="form-section">
            <div id="register-error" class="error-msg"></div>
            <label>Username</label>
            <input type="text" id="reg-name" placeholder="Choose a name">
            
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Create a password">
            
            <button class="btn" id="reg-btn" onclick="registerUser()">Create Account</button>
        </div>
    </div>
</div>

<script>
// UPDATE THIS TO YOUR ACTUAL RAILWAY URL
const API = "https://zimbermannegitio-production.up.railway.app";

function showTab(type){
    document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
    
    if(type === 'login'){
        document.querySelector('.tab-link:nth-child(1)').classList.add('active');
        document.getElementById('login-section').classList.add('active');
    } else {
        document.querySelector('.tab-link:nth-child(2)').classList.add('active');
        document.getElementById('id-register-section').classList.add('active');
    }
}

function showError(id, msg){
    const el = document.getElementById(id);
    el.innerText = msg;
    el.classList.add('show');
}

function setLoading(id, isLoading){
    const btn = document.getElementById(id);
    btn.disabled = isLoading;
    btn.innerText = isLoading ? "Processing..." : (id === 'login-btn' ? "Sign In" : "Create Account");
}

function registerUser(){
    const name = document.getElementById("reg-name").value.trim();
    const password = document.getElementById("reg-password").value;
    
    document.getElementById("register-error").classList.remove("show");

    if(!name || !password) return showError("register-error", "All fields are required.");
    
    setLoading("reg-btn", true);

    fetch(`${API}/api/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
    })
    .then(async res => {
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "Registration failed");
        return data;
    })
    .then(data => {
        alert("Account created! Please login.");
        showTab('login');
        setLoading("reg-btn", false);
    })
    .catch(err => {
        setLoading("reg-btn", false);
        showError("register-error", err.message);
    });
}

function loginUser(){
    const name = document.getElementById("login-name").value.trim();
    const password = document.getElementById("login-password").value;

    document.getElementById("login-error").classList.remove("show");

    if(!name || !password) return showError("login-error", "Please enter credentials.");

    setLoading("login-btn", true);

    fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
    })
    .then(async res => {
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "Login failed");
        return data;
    })
    .then(data => {
        localStorage.setItem("UBAONI_user", JSON.stringify(data));
        window.location.href = "dashboard.html";
    })
    .catch(err => {
        setLoading("login-btn", false);
        showError("login-error", err.message);
    });
}

// Allow Enter key to submit forms
document.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        if (document.getElementById("login-section").classList.contains("active")) {
            loginUser();
        } else {
            registerUser();
        }
    }
});
</script>

</body>
</html>
