<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBAONI - Access</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'DM Sans',sans-serif;
    background:#f7f2e8;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:20px 16px;
}
.container{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:16px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}
.left{
    background:#1b2e20;
    color:white;
    padding:50px;
}
.left h1{
    font-size:3rem;
    margin-bottom:20px;
}
.left p{
    line-height:1.8;
}
.right{
    padding:50px;
}
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
.tabs button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
}
.active-tab{
    background:black;
    color:white;
}
input{
    width:100%;
    padding:14px;
    margin-bottom:14px;
    border-radius:8px;
    border:1px solid #ccc;
}
button.submit{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:black;
    color:white;
    font-weight:700;
    cursor:pointer;
}
#register-form{
    display:none;
}
@media(max-width:768px){
    body{
        align-items:flex-start;
        padding:16px 12px 24px;
    }
    .container{
        grid-template-columns:1fr;
        border-radius:20px;
    }
    .left,
    .right{
        padding:32px 24px;
    }
    .left{
        border-bottom:1px solid rgba(255,255,255,.08);
    }
    .left h1{
        font-size:2.5rem;
    }
    .tabs{
        flex-wrap:wrap;
    }
    .tabs button{
        flex:1 1 48%;
    }
}
@media(max-width:480px){
    .left,
    .right{
        padding:24px 18px;
    }
    .left h1{
        font-size:2rem;
    }
    .tabs button{
        flex:1 1 100%;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="left">
    <h1>UBAONI</h1>
    <p>
        Tanzania's public announcement and community board.<br><br>
        Post announcements, business ads, greetings, and events.
    </p>
</div>

<div class="right">

<div class="tabs">
    <button id="login-tab" class="active-tab" onclick="switchTab('login')">
        Sign In
    </button>

    <button id="register-tab" onclick="switchTab('register')">
        Create Account
    </button>
</div>

<div id="login-form">
    <input type="text" id="login-name" placeholder="Enter Your Name">
    <button class="submit" onclick="loginUser()">
        Enter Dashboard
    </button>
</div>

<div id="register-form">
    <input type="text" id="reg-name" placeholder="Full Name">
    <input type="text" id="reg-phone" placeholder="Phone Number">
    <input type="email" id="reg-email" placeholder="Email Address">

    <button class="submit" onclick="registerUser()">
        Create Account
    </button>
</div>

</div>
</div>

<script>
function switchTab(tab){
    document.getElementById("login-form").style.display =
        tab === "login" ? "block" : "none";

    document.getElementById("register-form").style.display =
        tab === "register" ? "block" : "none";

    document.getElementById("login-tab").classList.toggle(
        "active-tab",
        tab === "login"
    );

    document.getElementById("register-tab").classList.toggle(
        "active-tab",
        tab === "register"
    );
}

function registerUser(){
    const name = document.getElementById("reg-name").value.trim();
    const phone = document.getElementById("reg-phone").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const password = prompt("Create a password (at least 6 characters):");

    if (!name || !password) {
        return alert("Name and password are required.");
    }
    if (password.length < 6) {
        return alert("Password must be at least 6 characters.");
    }

    fetch('http://localhost:3000/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert("Error: " + data.error);
        } else {
            alert("✅ Account created! Logging in...");
            localStorage.setItem("UBAONI_user", JSON.stringify(data));
            window.location.href = "dashboard.html";
        }
    })
    .catch(err => alert("Connection error. Is the server running on port 3000?"));
}

function loginUser(){
    const name = document.getElementById("login-name").value.trim();
    const password = prompt("Enter your password:");

    if(!name || !password){
        return alert("Please enter your name and password.");
    }

    fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert("Error: " + data.error);
        } else {
            alert("✅ Login successful!");
            localStorage.setItem("UBAONI_user", JSON.stringify(data));
            window.location.href = "dashboard.html";
        }
    })
    .catch(err => alert("Connection error. Is the server running on port 3000?"));
}
</script>

</body>
</html>
